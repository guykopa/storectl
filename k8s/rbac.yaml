apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: storectl
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/rollout"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: storectl
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: storectl
subjects:
  - kind: ServiceAccount
    name: default
    namespace: storectl
